name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        os: [ macos-26 ]
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract pinned macFUSE SDK
        if: runner.os == 'macOS'
        run: |
          chmod +x ./scripts/extract-macfuse-sdk.sh
          ./scripts/extract-macfuse-sdk.sh --output "$RUNNER_TEMP/macfuse-sdk"
          echo "FILE_SNITCH_FUSE_INCLUDE_DIR=$RUNNER_TEMP/macfuse-sdk/include" >> "$GITHUB_ENV"
          echo "FILE_SNITCH_FUSE_LIB_DIR=$RUNNER_TEMP/macfuse-sdk/lib" >> "$GITHUB_ENV"

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
